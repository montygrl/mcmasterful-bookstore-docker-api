services:
  nginx:
    image: nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - books
      - orders
      - warehouse

  front-end:
    image: ghcr.io/mcmastercce/bvd-103-mcmasterful-books/mcmasterful-books-docker:main
    volumes:
      - ./adapter:/source/adapter

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  mongo-books:
    image: mongo:latest

  mongo-orders:
    image: mongo:latest

  mongo-warehouse:
    image: mongo:latest

  books:
    image: node:20
    volumes:
      - ./:/app
    working_dir: /app
    command: npx -y tsx ./books/server.ts
    environment:
      - MONGODB_URL=mongodb://mongo-books:27017
      - RABBITMQ_URL=amqp://rabbitmq
    depends_on:
      - mongo-books
      - rabbitmq

  orders:
    image: node:20
    volumes:
      - ./:/app
    working_dir: /app
    command: npx -y tsx ./orders/server.ts
    environment:
      - MONGODB_URL=mongodb://mongo-orders:27017
      - RABBITMQ_URL=amqp://rabbitmq
    depends_on:
      - mongo-orders
      - rabbitmq

  warehouse:
    image: node:20
    volumes:
      - ./:/app
    working_dir: /app
    command: npx -y tsx ./warehouse/server.ts
    environment:
      - MONGODB_URL=mongodb://mongo-warehouse:27017
      - RABBITMQ_URL=amqp://rabbitmq
    depends_on:
      - mongo-warehouse
      - rabbitmq

  docs:
    image: node:20
    volumes:
      - ./:/app
    working_dir: /app
    command: npx -y tsx ./docs/server.ts
    depends_on:
      - books
      - orders
      - warehouse
