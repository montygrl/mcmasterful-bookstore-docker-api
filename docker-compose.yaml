services:
  nginx:
    image: nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
  front-end:
    image: ghcr.io/mcmastercce/bvd-103-mcmasterful-books/mcmasterful-books-docker:main
    volumes:
      - ./adapter:/source/adapter
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
  server:
    image: node:20
    volumes:
      - ./:/app
    working_dir: /app
    command: npx -y tsx ./src/server.ts
    environment:
      - MONGODB_URL=mongodb://mongo:27017
  server2:
    image: node:20
    volumes:
      - ./:/app
    working_dir: /app
    command: npx -y tsx ./src/server.ts
    environment:
      - MONGODB_URL=mongodb://mongo:27017
  server3:
    image: node:20
    volumes:
      - ./:/app
    working_dir: /app
    command: npx -y tsx ./src/server.ts
    environment:
      - MONGODB_URL=mongodb://mongo:27017