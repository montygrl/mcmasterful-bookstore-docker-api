server {
    listen 80;

    location / {
        proxy_pass http://front-end:9080/;
    }

    location /api/ {
        proxy_pass http://server:3000/;
    }

    location /docs {
        proxy_pass http://server:3000/docs;
    }
}
upstream backend {
    server server:3000;
    server server2:3000;
    server server3:3000;
}

proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=mycache:10m max_size=50m inactive=60m;
proxy_cache_key "$scheme$request_method$host$request_uri";

server {
    listen 80;

    location / {
        proxy_cache mycache;
        proxy_cache_valid 200 10m;
        proxy_cache_bypass $http_cache_control;
        add_header X-Proxy-Cache $upstream_cache_status;
        proxy_pass http://front-end:9080/;
    }

    location /api/books {
        proxy_cache mycache;
        proxy_cache_valid 200 10m;
        proxy_no_cache $args;
        proxy_cache_bypass $args;
        add_header X-Proxy-Cache $upstream_cache_status;
        proxy_pass http://backend/books;
    }

    location /api/ {
        proxy_pass http://backend/;
    }

    location /docs {
        proxy_pass http://backend/docs;
    }
}