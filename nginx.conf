server {
    listen 80;

    location / {
        proxy_pass http://front-end:9080/;
    }

    location /api/books {
        proxy_pass http://books:3001/books;
    }

    location /api/orders {
        proxy_pass http://orders:3002/orders;
    }

    location /api/warehouse {
        proxy_pass http://warehouse:3003/warehouse;
    }

    location /docs {
        proxy_pass http://docs:3000/docs;
    }
}
